<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOIP — Student Opportunity Intelligence Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'],
              display: ['Space Grotesk', 'Plus Jakarta Sans', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
              accent: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f' },
            },
          },
        },
      }
    </script>
    <style>
      body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      @keyframes pulse-dot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { animation: pulse-dot 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(2) { animation-delay: 0.16s; }
      .typing-dot:nth-child(3) { animation-delay: 0.32s; }
      .bg-noise {
        background-image:
          radial-gradient(circle at 20% 20%, rgba(14, 116, 144, 0.12), transparent 40%),
          radial-gradient(circle at 80% 10%, rgba(245, 158, 11, 0.12), transparent 35%),
          radial-gradient(circle at 10% 80%, rgba(6, 182, 212, 0.12), transparent 40%),
          radial-gradient(circle at 90% 90%, rgba(15, 118, 110, 0.08), transparent 35%);
      }
    </style>
  </head>
  <body class="bg-[#f6f4ef] text-slate-900 antialiased bg-noise">
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
