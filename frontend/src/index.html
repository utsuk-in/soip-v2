<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOIP — Opportunity Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'system-ui', 'sans-serif'],
              display: ['Space Grotesk', 'Outfit', 'system-ui', 'sans-serif'],
            },
            colors: {
              brand: { 50:'#ecfeff',100:'#cffafe',200:'#a5f3fc',300:'#67e8f9',400:'#22d3ee',500:'#06b6d4',600:'#0891b2',700:'#0e7490',800:'#155e75',900:'#164e63' },
              accent: { 50:'#fff1f2',100:'#ffe4e6',200:'#fecdd3',300:'#fda4af',400:'#fb7185',500:'#f43f5e',600:'#e11d48',700:'#be123c',800:'#9f1239',900:'#881337' },
              pop: '#22c55e',
              hot: '#ef4444',
            },
            animation: {
              'slide-up': 'slideUp 0.4s ease-out forwards',
              'scale-in': 'scaleIn 0.25s ease-out forwards',
            },
            keyframes: {
              slideUp: {
                from: { opacity: '0', transform: 'translateY(16px)' },
                to: { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                from: { opacity: '0', transform: 'scale(0.95)' },
                to: { opacity: '1', transform: 'scale(1)' },
              },
            },
            boxShadow: {
              'glow': '0 0 20px rgba(6, 182, 212, 0.18)',
              'glow-lg': '0 0 44px rgba(244, 63, 94, 0.18)',
            },
          },
        },
      }
    </script>
    <style>
      body { font-family: 'Outfit', system-ui, sans-serif; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #67e8f9; border-radius: 3px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in { animation: fadeIn 0.3s ease-out; }
      @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes pulse-dot { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
      .typing-dot { animation: pulse-dot 1.4s infinite ease-in-out both; }
      .typing-dot:nth-child(2) { animation-delay: 0.16s; }
      .typing-dot:nth-child(3) { animation-delay: 0.32s; }
      .bg-noise {
        background-image:
          radial-gradient(circle at 18% 18%, rgba(6, 182, 212, 0.10), transparent 40%),
          radial-gradient(circle at 82% 12%, rgba(244, 63, 94, 0.10), transparent 35%),
          radial-gradient(circle at 12% 78%, rgba(34, 197, 94, 0.08), transparent 42%),
          radial-gradient(circle at 90% 90%, rgba(14, 116, 144, 0.08), transparent 35%);
      }
      .gradient-text {
        background: linear-gradient(135deg, #06b6d4, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body class="bg-stone-50 text-stone-900 antialiased bg-noise dark:bg-stone-950 dark:text-stone-100">
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
